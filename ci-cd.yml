name: CI/CD – EnterpriseConsole

on:
  push:
    branches:
      - main        # → deploy production
      - develop     # → build only (test)
  pull_request:
    branches:
      - main

env:
  REGISTRY: <your-registry>.gra.container-registry.ovh.net   # ← sostituire
  IMAGE_NAME: enterprise-console

jobs:
  # ──────────────────────────────────────────
  build-test:
    name: Build (test image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.test
          push: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  build-push-prod:
    name: Build & Push (production image)
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to OVH Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OVH_REGISTRY_USER }}
          password: ${{ secrets.OVH_REGISTRY_PASSWORD }}

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  deploy-prod:
    name: Deploy to OVH Kubernetes
    runs-on: ubuntu-latest
    needs: build-push-prod
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig (OVH)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.OVH_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tag in deployment
        run: |
          kubectl set image deployment/enterprise-console \
            enterprise-console=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n enterprise-console

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/enterprise-console \
            -n enterprise-console \
            --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n enterprise-console
