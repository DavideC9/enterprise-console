version: "3.9"

services:
  enterprise-console:
    image: ${REGISTRY:-registry.example.com}/enterprise-console:${IMAGE_TAG:-latest}
    container_name: enterprise-console-prod
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
