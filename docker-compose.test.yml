version: "3.9"

services:
  enterprise-console:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: enterprise-console-test
    ports:
      - "4200:80"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

